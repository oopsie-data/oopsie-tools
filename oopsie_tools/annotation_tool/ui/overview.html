<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annotation Overview</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        h1 { font-size: 1.5rem; }
        .header-links a {
            color: #60a5fa;
            text-decoration: none;
            margin-left: 20px;
        }
        .header-links a:hover { text-decoration: underline; }
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #16213e;
            border-radius: 8px;
            padding: 15px 20px;
            min-width: 140px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4ade80;
        }
        .stat-value.warn { color: #fbbf24; }
        .stat-value.danger { color: #f87171; }
        .stat-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 4px;
        }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .tooltip {
            position: relative;
            cursor: help;
        }
        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: calc(100% + 8px);
            width: 280px;
            max-width: 320px;
            background: #0f172a;
            color: #e2e8f0;
            border: 1px solid #334155;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            line-height: 1.3;
            white-space: pre-line;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.08s ease-out;
            z-index: 50;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
        }
        .tooltip::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: calc(100% + 2px);
            border-width: 6px;
            border-style: solid;
            border-color: #0f172a transparent transparent transparent;
            opacity: 0;
            transition: opacity 0.08s ease-out;
            z-index: 51;
        }
        .tooltip:hover::after,
        .tooltip:hover::before {
            opacity: 1;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #16213e;
            color: #eee;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: #60a5fa; }
        .filter-btn.active {
            background: #1e3a5f;
            border-color: #60a5fa;
            color: #60a5fa;
        }
        .search-input {
            padding: 8px 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #16213e;
            color: #eee;
            font-size: 0.85rem;
            width: 200px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        thead th {
            background: #16213e;
            padding: 12px 10px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid #333;
            white-space: nowrap;
        }
        tbody tr {
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: background 0.1s;
        }
        tbody tr:hover { background: #16213e; }
        tbody td {
            padding: 10px;
            vertical-align: top;
        }
        .sample-id-cell {
            font-family: monospace;
            white-space: nowrap;
            color: #60a5fa;
        }
        .task-cell {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .soft-cell {
            min-width: 120px;
            color: #cbd5f5;
            font-size: 0.78rem;
        }
        .soft-line {
            display: block;
            margin-bottom: 4px;
        }
        .ann-cell {
            min-width: 220px;
            max-width: 320px;
        }
        .ann-cell.empty {
            color: #555;
            font-style: italic;
        }
        .ann-category {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 4px;
        }
        .category-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            background: #1e3a5f;
            color: #60a5fa;
        }
        .ann-description {
            color: #ccc;
            font-size: 0.8rem;
            line-height: 1.4;
            margin-bottom: 4px;
        }
        .ann-retry {
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .ann-meta {
            font-size: 0.72rem;
            color: #8fa2b8;
            margin-top: 4px;
        }
        .vlm-tag {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 6px;
            border-radius: 999px;
            font-size: 0.7rem;
            border: 1px solid #1e3a5f;
            color: #60a5fa;
            background: #0f172a;
        }
        .disagree {
            background: rgba(251, 191, 36, 0.08);
        }
        .disagree-marker {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fbbf24;
            margin-right: 6px;
        }
        .agree-marker {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            margin-right: 6px;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .annotator-header {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .vlm-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 999px;
            font-size: 0.7rem;
            border: 1px solid #1e3a5f;
            color: #60a5fa;
            background: #0f172a;
        }
        .annotator-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Annotation Overview</h1>
            <div class="header-links">
                <a href="/">Back to Annotator</a>
            </div>
        </header>
        <div class="stats-bar" id="stats-bar">
            <div class="loading">Loading...</div>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="disagree">Disagreements</button>
            <button class="filter-btn" data-filter="agree">Agreements</button>
            <button class="filter-btn" data-filter="soft">Soft Agree</button>
            <button class="filter-btn" data-filter="none">No annotations</button>
            <input type="text" class="search-input" id="search" placeholder="Search sample ID or task...">
        </div>
        <table>
            <thead id="table-head"></thead>
            <tbody id="table-body">
                <tr><td class="loading" colspan="10">Loading...</td></tr>
            </tbody>
        </table>
    </div>
    <script>
        const ANNOTATOR_COLORS = ['#60a5fa', '#f472b6', '#fbbf24', '#4ade80', '#a78bfa', '#fb923c'];
        let overviewData = null;
        let currentFilter = 'all';
        let searchQuery = '';
        const SOFT_AGREE_HUMAN_TOOLTIP = 'Soft agreement (Human) = Jaccard similarity of failure categories only: |A ∩ B| / |A ∪ B|.\\nPer-sample: average across all human-human pairs for that sample.\\nStat: mean of per-sample averages (samples with >=2 human annotations).';
        const SOFT_AGREE_VLM_TOOLTIP = 'Soft agreement (VLM-Human) = Jaccard similarity of failure categories only.\\nPer-sample: average across all human-VLM pairs for that sample.\\nStat: mean of per-sample averages (samples with >=1 human and >=1 VLM).';
        const SOFT_AGREE_COLUMN_TOOLTIP = 'Soft Agree column shows per-sample averages.\\nHuman: average across all human-human pairs.\\nVLM: average across all human-VLM pairs.';
        const STRICT_AGREE_HUMAN_TOOLTIP = 'Strict agree (Human) = all human annotators have identical failure categories and would_retry.';
        const STRICT_AGREE_VLM_TOOLTIP = 'Strict agree (VLM-Human) = any VLM annotation exactly matches any human annotation on failure categories and would_retry.';
        const SOFT_AGREE_THRESHOLD = 0.5;
        const SOFT_AGREE_FILTER_TOOLTIP = `Soft Agree filter: shows samples with Human or VLM soft agreement >= ${Math.round(SOFT_AGREE_THRESHOLD * 100)}%.`;

        function formatPct(value) {
            if (value === null || value === undefined) return '--';
            return `${Math.round(value * 100)}%`;
        }

        async function init() {
            overviewData = await fetch('/api/overview').then(r => r.json());
            const softBtn = document.querySelector('button[data-filter="soft"]');
            if (softBtn) {
                softBtn.dataset.tooltip = SOFT_AGREE_FILTER_TOOLTIP;
                softBtn.classList.add('tooltip');
            }
            renderStats();
            renderTableHead();
            renderTableBody();
        }

        function renderStats() {
            const s = overviewData.stats;
            document.getElementById('stats-bar').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${s.total_samples}</div>
                    <div class="stat-label">Total Samples</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${overviewData.annotators.length}</div>
                    <div class="stat-label">Annotators</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${s.multi_annotated}</div>
                    <div class="stat-label">Multi-Annotated (Human)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value tooltip" data-tooltip="${STRICT_AGREE_HUMAN_TOOLTIP}">${s.agreement}</div>
                    <div class="stat-label tooltip" data-tooltip="${STRICT_AGREE_HUMAN_TOOLTIP}">Strict Agree (Human)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${s.disagreement > 0 ? 'warn' : ''}">${s.disagreement}</div>
                    <div class="stat-label">Disagreements (Human)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${s.vlm_human_samples}</div>
                    <div class="stat-label">VLM+Human Samples</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value tooltip" data-tooltip="${STRICT_AGREE_VLM_TOOLTIP}">${s.vlm_human_agreement}</div>
                    <div class="stat-label tooltip" data-tooltip="${STRICT_AGREE_VLM_TOOLTIP}">Strict Agree (VLM-Human)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${s.vlm_human_disagreement > 0 ? 'warn' : ''}">${s.vlm_human_disagreement}</div>
                    <div class="stat-label">VLM-Human Disagreements</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value tooltip" data-tooltip="${SOFT_AGREE_HUMAN_TOOLTIP}">${formatPct(s.human_soft_agreement_avg)}</div>
                    <div class="stat-label tooltip" data-tooltip="${SOFT_AGREE_HUMAN_TOOLTIP}">Soft Agree (Human)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value tooltip" data-tooltip="${SOFT_AGREE_VLM_TOOLTIP}">${formatPct(s.vlm_human_soft_agreement_avg)}</div>
                    <div class="stat-label tooltip" data-tooltip="${SOFT_AGREE_VLM_TOOLTIP}">Soft Agree (VLM)</div>
                </div>
            `;
        }

        function renderTableHead() {
            const annotators = overviewData.annotators;
            const vlmAnnotators = new Set(overviewData.vlm_annotators || []);
            let headers = `<tr><th>Sample</th><th>Task</th><th class="tooltip" data-tooltip="${SOFT_AGREE_COLUMN_TOOLTIP}">Soft Agree</th>`;
            annotators.forEach((name, i) => {
                const color = ANNOTATOR_COLORS[i % ANNOTATOR_COLORS.length];
                const isVlm = vlmAnnotators.has(name);
                headers += `<th><div class="annotator-header">
                    <span class="annotator-color" style="background:${color}"></span>
                    ${name}
                    ${isVlm ? '<span class="vlm-badge">VLM</span>' : ''}
                </div></th>`;
            });
            headers += '</tr>';
            document.getElementById('table-head').innerHTML = headers;
        }

        function filterSamples() {
            return overviewData.samples.filter(s => {
                // Text search
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    const matchId = s.id.toLowerCase().includes(q);
                    const matchTask = (s.metadata.language_instruction || '').toLowerCase().includes(q);
                    if (!matchId && !matchTask) return false;
                }

                switch (currentFilter) {
                    case 'disagree':
                        return s.has_disagreement;
                    case 'agree':
                        return s.human_annotator_count >= 2 && !s.has_disagreement;
                    case 'soft': {
                        const humanSoft = (s.human_soft_agreement ?? -1);
                        const vlmSoft = (s.vlm_human_soft_agreement ?? -1);
                        return humanSoft >= SOFT_AGREE_THRESHOLD || vlmSoft >= SOFT_AGREE_THRESHOLD;
                    }
                    case 'none':
                        return s.annotator_count === 0;
                    default:
                        return true;
                }
            });
        }

        function renderAnnotationCell(ann) {
            if (!ann) return '<td class="ann-cell empty">--</td>';

            const cats = Array.isArray(ann.failure_category)
                ? ann.failure_category
                : (ann.failure_category ? [ann.failure_category] : []);

            const catTags = cats.map(c => `<span class="category-tag">${c}</span>`).join('');
            const desc = ann.failure_description || '';
            const retry = ann.would_retry || '';
            const isVlm = ann.source === 'vlm';
            const model = ann.model ? `<div class="ann-meta">Model: ${ann.model}</div>` : '';
            const conf = (ann.aggregated_confidence !== undefined && ann.aggregated_confidence !== null)
                ? `<div class="ann-meta">Confidence: ${Math.round(ann.aggregated_confidence * 100)}%</div>`
                : '';
            const vlmTag = isVlm ? '<div class="vlm-tag">VLM</div>' : '';

            return `<td class="ann-cell">
                <div class="ann-category">${catTags}</div>
                <div class="ann-description">${desc}</div>
                ${retry ? `<div class="ann-retry">Retry: ${retry}</div>` : ''}
                ${model}
                ${conf}
                ${vlmTag}
            </td>`;
        }

        function renderTableBody() {
            const filtered = filterSamples();
            const annotators = overviewData.annotators;

            if (filtered.length === 0) {
                document.getElementById('table-body').innerHTML =
                    `<tr><td colspan="${3 + annotators.length}" class="loading">No samples match this filter.</td></tr>`;
                return;
            }

            let rows = '';
            for (const sample of filtered) {
                const rowClass = sample.has_disagreement ? 'disagree' : '';
                const marker = sample.human_annotator_count >= 2
                    ? (sample.has_disagreement
                        ? '<span class="disagree-marker"></span>'
                        : '<span class="agree-marker"></span>')
                    : '';

                rows += `<tr class="${rowClass}" data-id="${sample.id}">`;
                rows += `<td class="sample-id-cell">${marker}${sample.id}</td>`;
                rows += `<td class="task-cell" title="${sample.metadata.language_instruction || ''}">${sample.metadata.language_instruction || 'N/A'}</td>`;
                const humanSoft = formatPct(sample.human_soft_agreement);
                const vlmSoft = formatPct(sample.vlm_human_soft_agreement);
                rows += `<td class="soft-cell tooltip" data-tooltip="${SOFT_AGREE_COLUMN_TOOLTIP}">
                    <span class="soft-line">Human: ${humanSoft}</span>
                    <span class="soft-line">VLM: ${vlmSoft}</span>
                </td>`;

                for (const name of annotators) {
                    rows += renderAnnotationCell(sample.annotations[name]);
                }
                rows += '</tr>';
            }

            document.getElementById('table-body').innerHTML = rows;

            // Click to open in annotator
            document.querySelectorAll('tbody tr[data-id]').forEach(row => {
                row.addEventListener('click', () => {
                    const idx = overviewData.samples.findIndex(s => s.id === row.dataset.id);
                    if (idx >= 0) window.open(`/?sample=${idx}`, '_blank');
                });
            });
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTableBody();
            });
        });

        // Search
        document.getElementById('search').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderTableBody();
        });

        init();
    </script>
</body>
</html>
